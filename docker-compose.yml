services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: stourio
      POSTGRES_USER: stourio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    # No external ports: only accessible within Docker network
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stourio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # No external ports: only accessible within Docker network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.50
    ports:
      - "127.0.0.1:16686:16686"  # Web UI, localhost only
    expose:
      - "4317"  # OTLP gRPC, internal only
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    volumes:
      - jaeger_data:/data

  stourioclaw:
    build: .
    shm_size: 2gb
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://stourio:${POSTGRES_PASSWORD:-changeme}@postgres:5432/stourio
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      WORKSPACE_DIR: /app/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ./workspace:/app/workspace
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  jaeger_data:
